name = "dance-planner"
compatibility_date = "2024-01-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

# Notion API CORS proxy — routes /api/notion/* to Notion servers
[[rules]]
type = "ESModule"
globs = ["workers/**/*.ts"]

[site]
bucket = "./dist"

# Response headers for all served assets
# (ensures SharedArrayBuffer works for FFmpeg.wasm in production)
[[headers]]
for = "/*"
[headers.values]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
